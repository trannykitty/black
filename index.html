<!doctype html><meta charset="utf-8"><title>Black Screen Lite</title><style>html,body{margin:0;height:100%;background:#000;cursor:none}#h{position:fixed;left:10px;bottom:10px;color:#555;font:12px sans-serif}:fullscreen #h{display:none}</style><div id=h>Click to enter fullscreen. Esc to exit.</div><script>addEventListener("click",()=>document.documentElement.requestFullscreen?.(),{once:1});let x;onmousemove=()=>{document.body.style.cursor="";clearTimeout(x);x=setTimeout(()=>document.body.style.cursor="none",1500)}</script>
